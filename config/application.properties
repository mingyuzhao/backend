server.connection-timeout=60000
spring.mvc.async.request-timeout=60000

spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.flyway.enabled=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
#spring.jpa.database=POSTGRESQL

#maximum number of milliseconds that a client will wait for a connection
spring.datasource.hikari.connection-timeout=20000
#minimum number of idle connections maintained by HikariCP in a connection pool
spring.datasource.hikari.minimum-idle=1
#maximum pool size
spring.datasource.hikari.maximum-pool-size=10
#maximum idle time for connection 			
spring.datasource.hikari.idle-timeout=10000
#maximum lifetime in milliseconds of a connection in the pool after it is closed. 			
spring.datasource.hikari.max-lifetime=1000
#default auto-commit behavior.
spring.datasource.hikari.auto-commit=false

# OAuth2 Resource Server (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://v21dkldl01.tmmc.na.corp.toyota.com:8180/auth/realms/CMS

# App-level JWT checks for resource access mapping
app.security.issuer-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}
app.security.required-client-id=spa

# Local JWT settings for /auth/login token generation path
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:change-this-jwt-secret-to-a-secure-32-char-minimum}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:${JWT_EXPIRATION_MS:86400000}}

